<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishoa.id 🍜</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: -apple-system, 'Inter', sans-serif;
    text-align: center;
    background: #0d0d0d;
    color: white;
    padding: 40px 24px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .logo { font-size: 48px; margin-bottom: 16px; }
  h2 { font-size: 20px; margin-bottom: 8px; }
  p { color: #999; font-size: 14px; margin-bottom: 28px; max-width: 320px; }
  a.btn {
    display: inline-block;
    width: 100%;
    max-width: 320px;
    margin-top: 12px;
    padding: 16px 24px;
    background: #E8590C;
    color: white;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
  }
</style>
</head>
<body>

<div class="logo">🍜</div>
<h2>Membuka di Chrome...</h2>
<p>Ketuk tombol di bawah kalau belum otomatis terbuka</p>

<a class="btn" id="primaryBtn" href="#">👉 Buka di Chrome</a>

<script>
  var TARGET_URL  = "https://petelid.github.io/mishoa/toko.html";
  var TARGET_HOST = TARGET_URL.replace(/^https?:\/\//, "");
  var ua = navigator.userAgent || navigator.vendor || window.opera || "";
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

  // Selalu paksa ke Chrome, tanpa kecuali, tanpa fallback ke browser lain.
  var chromeUrl = isIOS
    ? "googlechromes://" + TARGET_HOST
    : "intent://" + TARGET_HOST + "#Intent;scheme=https;package=com.android.chrome;end";

  document.getElementById('primaryBtn').setAttribute('href', chromeUrl);

  // Trigger otomatis begitu halaman dibuka, tanpa perlu tap.
  window.location.href = chromeUrl;
</script>

</body>
</html>
