<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Mishoa.id 🍜</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: sans-serif;
  padding-bottom: 300px; /* biar ga ketutup keyboard */
}
</style>
</head>

<body class="bg-gray-50">

<div class="max-w-md mx-auto p-4">

  <!-- HEADER -->
  <h1 class="text-2xl font-bold text-center mb-2">Mishoa 🍜</h1>
  <p class="text-center text-gray-500 mb-4">Order cepat & praktis</p>

  <!-- INFO IG BROWSER -->
  <div class="bg-yellow-100 text-yellow-800 text-sm p-3 rounded-xl mb-4">
    👉 Jika form tidak nyaman, buka di Chrome (klik titik 3 kanan atas)
  </div>

  <!-- FORM -->
  <div class="bg-white p-4 rounded-2xl shadow">

    <input type="text" id="nama" placeholder="Nama"
      class="w-full border p-3 rounded-xl mb-3">

    <textarea id="alamat" placeholder="Alamat"
      class="w-full border p-3 rounded-xl mb-3"></textarea>

    <select id="menu" class="w-full border p-3 rounded-xl mb-3">
      <option value="">Pilih Menu</option>
      <option>Misoa Original</option>
      <option>Misoa Ayam Bawang</option>
    </select>

    <button onclick="orderWA()"
      class="w-full bg-green-500 text-white p-3 rounded-xl font-bold">
      Pesan via WhatsApp
    </button>

  </div>

</div>

<!-- SCRIPT ANTI KEYBOARD -->
<script>
document.querySelectorAll('input, textarea, select').forEach(el => {
  el.addEventListener('focus', () => {
    setTimeout(() => {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  });
});
</script>

<!-- SCRIPT WA -->
<script>
function orderWA() {
  let nama = document.getElementById("nama").value;
  let alamat = document.getElementById("alamat").value;
  let menu = document.getElementById("menu").value;

  let text = `Halo saya mau order Mishoa 🍜

Nama: ${nama}
Alamat: ${alamat}
Pesanan: ${menu}`;

  let url = "https://wa.me/6282112007575?text=" + encodeURIComponent(text);

  window.open(url, '_blank');
}
</script>

</body>
</html>
