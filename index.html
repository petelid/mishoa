<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishoa.id 🍜</title>

<!-- Lapis 1: redirect otomatis via meta refresh.
     Ini jalan di HAMPIR SEMUA browser bahkan sebelum JS sempat dieksekusi,
     dan tidak bergantung sama sekali pada skema custom (intent://, dll) -->
<meta http-equiv="refresh" content="0; url=https://petelid.github.io/mishoa/toko.html">

<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: -apple-system, 'Inter', sans-serif;
    text-align: center;
    background: #0d0d0d;
    color: white;
    padding: 40px 24px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .logo { font-size: 48px; margin-bottom: 16px; }
  h2 { font-size: 20px; margin-bottom: 8px; }
  p { color: #999; font-size: 14px; margin-bottom: 28px; max-width: 320px; }
  a.btn {
    display: inline-block;
    width: 100%;
    max-width: 320px;
    margin-top: 12px;
    padding: 16px 24px;
    background: #E8590C;
    color: white;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
  }
  .hint {
    margin-top: 20px;
    font-size: 12px;
    color: #666;
    max-width: 300px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="logo">🍜</div>
<h2 id="title">Membuka Mishoa.id...</h2>
<p id="subtitle">Kalau tidak otomatis terbuka, ketuk tombol di bawah</p>

<a class="btn" id="primaryBtn" href="https://petelid.github.io/mishoa/toko.html">
  👉 Buka Mishoa.id
</a>

<p class="hint" id="inAppHint" style="display:none;">
  Kamu sedang membuka ini dari dalam aplikasi (Instagram/Facebook/TikTok/dll).
  Ketuk ⋮ atau ••• di pojok atas, lalu pilih "Buka di Browser" untuk pengalaman belanja yang lebih lancar.
</p>

<script>
  // TARGET_URL: satu-satunya sumber kebenaran, dipakai untuk redirect JS,
  // dan sudah sama persis dengan href tombol + meta refresh di atas.
  var TARGET_URL = "https://petelid.github.io/mishoa/toko.html";

  var ua = navigator.userAgent || navigator.vendor || window.opera || "";
  var isInAppBrowser = /FBAN|FBAV|Instagram|Line\/|MicroMessenger|TikTok/i.test(ua);

  if (isInAppBrowser) {
    // Di dalam in-app browser (webview Instagram/FB/TikTok/dll), kita TIDAK
    // auto-redirect. https:// link tetap akan dibuka di webview yang sama,
    // jadi lebih membantu kalau user diarahkan untuk pakai menu "buka di
    // browser" bawaan aplikasi tersebut, daripada dipaksa redirect berulang.
    document.getElementById('title').textContent = 'Buka di browser utama';
    document.getElementById('subtitle').textContent =
      'Untuk pemesanan yang lancar, buka halaman ini di browser HP-mu (bukan di dalam aplikasi).';
    document.getElementById('inAppHint').style.display = 'block';
  } else {
    // Browser normal apa pun (Chrome, Safari, Samsung Internet, Firefox, dst):
    // langsung redirect pakai window.location, cara paling universal,
    // tidak bergantung skema custom apa pun.
    window.location.replace(TARGET_URL);
  }

  // Tombol tetap selalu berfungsi sebagai fallback terakhir,
  // baik auto-redirect gagal maupun user memang berada di in-app browser.
  document.getElementById('primaryBtn').addEventListener('click', function() {
    window.location.href = TARGET_URL;
  });
</script>

</body>
</html>
