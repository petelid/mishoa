<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishoa.id 🍜</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial, sans-serif; }
</style>
</head>

<body class="bg-black text-white">

<!-- NAVBAR -->
<div class="p-4 flex justify-between bg-white/10">
  <h1>🍜 Mishoa.id</h1>
  <div onclick="scrollToCart()" class="cursor-pointer">
    🛒 <span id="cartCount">0</span>
  </div>
</div>

<!-- HERO -->
<div class="text-center p-10">
  <h2 class="text-2xl mb-3">Misoa Cepat & Praktis</h2>
  <button onclick="scrollToCart()" class="bg-orange-500 px-4 py-2 rounded">Pesan</button>
</div>

<!-- PRODUK -->
<div id="productList" class="grid md:grid-cols-3 gap-4 p-4"></div>

<!-- CART -->
<div id="cartSection" class="p-4">
  <h2>Keranjang</h2>
  <div id="cart"></div>

  <input id="nama" placeholder="Nama" class="w-full mt-2 p-2 text-black">
  <input id="alamat" placeholder="Alamat" class="w-full mt-2 p-2 text-black">

  <p class="mt-2">Total: <span id="total">Rp0</span></p>

  <button onclick="checkout()" class="bg-green-500 w-full mt-3 p-2">
    Checkout
  </button>
</div>

<script>
let cart = []

const products = [
  {nama:"Ayam Bawang",harga:15000,stock:5,img:"https://images.unsplash.com/photo-1512058564366-c9e3e0468a98?q=80&w=800"},
  {nama:"Laksa",harga:18000,stock:0,img:"https://images.unsplash.com/photo-1553621042-f6e147245754?q=80&w=800"},
  {nama:"Goreng",harga:17000,stock:3,img:"https://images.unsplash.com/photo-1612929633738-8fe44f7ec841?q=80&w=800"}
]

function rupiah(n){
  return "Rp" + n.toLocaleString("id-ID")
}

function renderProducts(){
  let html = ""
  products.forEach(p=>{
    html += `
    <div class="bg-white/10 p-3">
      <img src="${p.img}" class="w-full h-40 object-cover">
      <h3>${p.nama}</h3>
      <p>${rupiah(p.harga)}</p>
      <p>Stok: ${p.stock}</p>
      ${
        p.stock>0
        ? `<button onclick="add('${p.nama}')" class="bg-orange-500 w-full mt-2">+ Keranjang</button>`
        : `<button disabled class="bg-gray-500 w-full mt-2">Habis</button>`
      }
    </div>`
  })
  document.getElementById("productList").innerHTML = html
}

function add(nama){
  let p = products.find(x=>x.nama===nama)
  let item = cart.find(x=>x.nama===nama)

  if(item){
    if(item.qty < p.stock) item.qty++
  }else{
    cart.push({nama:nama,harga:p.harga,qty:1})
  }

  renderCart()
}

function renderCart(){
  let html = ""
  let total = 0
  let qty = 0

  cart.forEach(i=>{
    let sub = i.harga*i.qty
    total += sub
    qty += i.qty

    html += `<p>${i.nama} x${i.qty} = ${rupiah(sub)}</p>`
  })

  // BONUS FIX
  let bonus = Math.floor(qty/3)
  if(bonus>0){
    html += `<p style="color:lightgreen">🎁 Bonus Ayam Bawang x${bonus}</p>`
  }

  document.getElementById("cart").innerHTML = html
  document.getElementById("total").innerText = rupiah(total)
  document.getElementById("cartCount").innerText = qty
}

function checkout(){
  if(cart.length===0) return alert("Keranjang kosong")

  let nama = document.getElementById("nama").value
  let alamat = document.getElementById("alamat").value

  if(!nama || !alamat) return alert("Isi data dulu")

  let text = "ORDER MISHOA\n\n"

  let total = 0
  let qty = 0

  cart.forEach(i=>{
    let sub = i.harga*i.qty
    text += `${i.nama} x${i.qty} = ${rupiah(sub)}\n`
    total += sub
    qty += i.qty

    let p = products.find(p=>p.nama===i.nama)
    p.stock -= i.qty
    if(p.stock < 0) p.stock = 0
  })

  let bonus = Math.floor(qty/3)
  if(bonus>0){
    text += `\nBonus Ayam Bawang x${bonus}\n`
  }

  let ongkir = total>=50000 ? 0 : 10000
  let grand = total + ongkir

  text += `\nTotal: ${rupiah(grand)}`
  text += `\nNama: ${nama}`
  text += `\nAlamat: ${alamat}`

  window.open("https://wa.me/6282112007575?text="+encodeURIComponent(text))

  cart=[]
  renderCart()
  renderProducts()
}

function scrollToCart(){
  document.getElementById("cartSection").scrollIntoView({behavior:"smooth"})
}

renderProducts()
</script>

</body>
</html>
