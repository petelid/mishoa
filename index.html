<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishoa.id 🍜</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: -apple-system, 'Inter', sans-serif;
    text-align: center;
    background: #0d0d0d;
    color: white;
    padding: 40px 24px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .logo { font-size: 48px; margin-bottom: 16px; }
  h2 { font-size: 20px; margin-bottom: 8px; }
  p { color: #999; font-size: 14px; margin-bottom: 28px; max-width: 320px; }
  a.btn {
    display: inline-block;
    width: 100%;
    max-width: 320px;
    margin-top: 12px;
    padding: 16px 24px;
    background: #E8590C;
    color: white;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
  }
  a.btn.secondary {
    background: transparent;
    border: 1px solid #333;
    color: #ccc;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #333;
    border-top-color: #E8590C;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="logo">🍜</div>
<div class="spinner" id="spinner"></div>
<h2 id="title">Membuka Mishoa.id...</h2>
<p id="subtitle">Ketuk tombol di bawah untuk lanjut pemesanan</p>

<a class="btn" id="primaryBtn" href="#">👉 Buka di Browser</a>

<script>
  const TARGET_URL = "https://petelid.github.io/mishoa/toko.html";
  const ua = navigator.userAgent || navigator.vendor || window.opera;

  const isAndroid = /android/i.test(ua);
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isInAppBrowser = /FBAN|FBAV|Instagram|Line\/|MicroMessenger|TikTok/i.test(ua);

  const primaryBtn = document.getElementById('primaryBtn');
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');

  if (isAndroid) {
    // Coba buka otomatis via Chrome intent
    title.textContent = 'Membuka di Chrome...';
    primaryBtn.textContent = '👉 Buka di Chrome';
    primaryBtn.href = `intent://${TARGET_URL.replace('https://','')}#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=${encodeURIComponent(TARGET_URL)};end`;

    // Auto redirect kalau bukan dari in-app browser (langsung buka)
    if (!isInAppBrowser) {
      setTimeout(() => {
        window.location.href = primaryBtn.href;
      }, 600);
    }
  } else if (isIOS) {
    // iOS tidak support intent://, langsung pakai link biasa
    title.textContent = 'Membuka di Safari...';
    subtitle.textContent = 'Jika tidak otomatis terbuka, ketuk tombol di bawah';
    primaryBtn.textContent = '👉 Buka di Safari';
    primaryBtn.href = TARGET_URL;
    primaryBtn.target = '_blank';

    if (!isInAppBrowser) {
      setTimeout(() => {
        window.location.href = TARGET_URL;
      }, 600);
    }
  } else {
    // Desktop atau browser lain - langsung redirect saja
    window.location.href = TARGET_URL;
  }

  if (isInAppBrowser) {
    title.textContent = 'Buka di browser utama';
    subtitle.textContent = 'Kamu sedang di dalam aplikasi (Instagram/Facebook/dll). Ketuk tombol di bawah untuk pemesanan yang lancar.';
  }
</script>

</body>
</html>
