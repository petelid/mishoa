<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishoa.id 🍜</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
</style>
</head>

<body class="bg-black text-white">

<!-- NAVBAR -->
<div class="sticky top-0 z-50 backdrop-blur bg-white/5 border-b border-white/10 px-6 py-4 flex justify-between items-center">
  <h1 class="font-bold text-lg">🍜 Mishoa.id</h1>
  <div onclick="scrollToCart()" class="cursor-pointer bg-orange-500 px-4 py-2 rounded-xl">
    🛒 <span id="cartCount">0</span>
  </div>
</div>

<!-- HERO -->
<section class="text-center py-20 px-6">
  <h2 class="text-4xl font-bold mb-4">
    Misoa Premium Cepat & Praktis 🍜
  </h2>
  <p class="text-gray-400 mb-6">
    Order via WhatsApp. Simple & cepat.
  </p>
  <button onclick="scrollToCart()" class="bg-orange-500 px-6 py-3 rounded-xl">
    Pesan Sekarang
  </button>
</section>

<!-- PRODUK -->
<div id="productList" class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 px-6 pb-16"></div>

<!-- CART -->
<div id="cartSection" class="max-w-xl mx-auto bg-white/5 p-6 rounded-2xl mb-20">
  <h2 class="text-lg font-bold mb-3">🛒 Keranjang</h2>

  <div id="cart"></div>

  <input id="nama" placeholder="Nama" class="bg-white/10 p-2 w-full mt-3 rounded">
  <input id="alamat" placeholder="Alamat" class="bg-white/10 p-2 w-full mt-2 rounded">

  <h3 class="mt-3 font-bold">Total: <span id="total">Rp0</span></h3>

  <button onclick="checkout()" class="bg-green-500 w-full mt-3 py-2 rounded">
    Checkout WhatsApp
  </button>
</div>

<script>
let cart = []

const products = [
  {nama:"Ayam Bawang",harga:15000,stock:5,img:"https://images.unsplash.com/photo-1512058564366-c9e3e0468a98?q=80&w=800"},
  {nama:"Laksa",harga:18000,stock:0,img:"https://images.unsplash.com/photo-1553621042-f6e147245754?q=80&w=800"},
  {nama:"Goreng",harga:17000,stock:3,img:"https://images.unsplash.com/photo-1612929633738-8fe44f7ec841?q=80&w=800"}
]

function rupiah(n){
  return "Rp" + n.toLocaleString("id-ID")
}

function renderProducts(){
  let html = ""
  products.forEach(p=>{
    html += `
    <div class="bg-white/5 p-4 rounded-xl">
      <img src="${p.img}" class="w-full h-40 object-cover rounded mb-2">
      <h3>${p.nama}</h3>
      <p>${rupiah(p.harga)}</p>
      <p class="text-sm">Stok: ${p.stock}</p>
      ${
        p.stock > 0
        ? `<button onclick="add('${p.nama}')" class="bg-orange-500 w-full mt-2 py-1 rounded">+ Keranjang</button>`
        : `<button disabled class="bg-gray-500 w-full mt-2 py-1 rounded">Habis</button>`
      }
    </div>`
  })
  document.getElementById("productList").innerHTML = html
}

function add(nama){
  let p = products.find(x=>x.nama===nama)
  let item = cart.find(x=>x.nama===nama)

  if(item){
    if(item.qty < p.stock) item.qty++
  }else{
    cart.push({nama:nama,harga:p.harga,qty:1})
  }

  renderCart()
}

function renderCart(){
  let html = ""
  let total = 0
  let qty = 0

  cart.forEach(i=>{
    let sub = i.harga*i.qty
    total += sub
    qty += i.qty

    html += `<p>${i.nama} x${i.qty} = ${rupiah(sub)}</p>`
  })

  document.getElementById("cart").innerHTML = html
  document.getElementById("total").innerText = rupiah(total)
  document.getElementById("cartCount").innerText = qty
}

function checkout(){
  if(cart.length===0) return alert("Keranjang kosong")

  let nama = document.getElementById("nama").value
  let alamat = document.getElementById("alamat").value

  if(!nama || !alamat) return alert("Isi data dulu")

  let text = "ORDER MISHOA\n\n"

  let total = 0
  let qty = 0

  cart.forEach(i=>{
    let sub = i.harga*i.qty
    text += `${i.nama} x${i.qty} = ${rupiah(sub)}\n`
    total += sub
    qty += i.qty

    let p = products.find(p=>p.nama===i.nama)
    p.stock -= i.qty
  })

  let bonus = Math.floor(qty/3)
  if(bonus>0){
    text += `\nBonus Ayam Bawang x${bonus}\n`
  }

  let ongkir = total>=50000 ? 0 : 10000
  let grand = total+ongkir

  text += `\nTotal: ${rupiah(grand)}`
  text += `\nNama: ${nama}`
  text += `\nAlamat: ${alamat}`

  window.open("https://wa.me/6282112007575?text="+encodeURIComponent(text))

  cart=[]
  renderCart()
  renderProducts()
}

function scrollToCart(){
  document.getElementById("cartSection").scrollIntoView({behavior:"smooth"})
}

renderProducts()
</script>

</body>
</html>
