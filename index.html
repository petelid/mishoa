<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishoa.id 🍜</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background:#fff; }
.button-wa {
  background:#25D366; color:white; padding:12px 20px; border-radius:8px;
  display:inline-block; text-align:center; font-weight:600; text-decoration:none;
  width:100%;
}
</style>
</head>
<body class="p-4">

<h1 class="text-2xl font-bold mb-4">Order Mishoa.id</h1>

<!-- Produk -->
<div class="mb-4">
  <label class="block font-semibold mb-1">Ayam Bawang</label>
  <input type="number" min="0" value="1" id="qtyAyamBawang" class="border p-2 w-full">
</div>
<div class="mb-4">
  <label class="block font-semibold mb-1">Goreng</label>
  <input type="number" min="0" value="2" id="qtyGoreng" class="border p-2 w-full">
</div>

<!-- Nama & Alamat -->
<div class="mb-4">
  <label class="block font-semibold mb-1">Nama</label>
  <input type="text" id="nama" class="border p-2 w-full" placeholder="Masukkan nama">
</div>
<div class="mb-4">
  <label class="block font-semibold mb-1">Alamat</label>
  <input type="text" id="alamat" class="border p-2 w-full" placeholder="Masukkan alamat">
</div>

<!-- Total -->
<div class="mb-4 p-4 border rounded bg-gray-50">
  <p>Subtotal: Rp <span id="subtotal">0</span></p>
  <p>Ongkir: Rp <span id="ongkir">0</span></p>
  <p class="font-bold">Total Bayar: Rp <span id="totalBayar">0</span></p>
</div>

<!-- Tombol WA -->
<a href="#" id="btnWA" class="button-wa mt-2">Checkout via WhatsApp</a>

<script>
function updateTotal() {
  let qtyAyamBawang = parseInt(document.getElementById('qtyAyamBawang').value) || 0;
  let qtyGoreng = parseInt(document.getElementById('qtyGoreng').value) || 0;
  let hargaAyamBawang = 15000;
  let hargaGoreng = 17000; // total 2x 17000 = 34.000

  let subtotal = (qtyAyamBawang * hargaAyamBawang) + (qtyGoreng * hargaGoreng);
  let ongkir = 0; // default ongkir 0
  let totalBayar = subtotal + ongkir;

  // Bonus: selalu +1 Ayam Bawang
  let bonus = qtyAyamBawang >= 1 ? 1 : 0;

  document.getElementById('subtotal').innerText = subtotal;
  document.getElementById('ongkir').innerText = ongkir;
  document.getElementById('totalBayar').innerText = totalBayar;

  // Prepare WA message
  let nama = document.getElementById('nama').value || '-';
  let alamat = document.getElementById('alamat').value || '-';
  let message = `*ORDER MISHOA.ID*\nOrder#${Math.floor(Math.random()*1000000)}\n\n*Detail Pesanan:*\n• Ayam Bawang x${qtyAyamBawang} = Rp${qtyAyamBawang*hargaAyamBawang}\n• Goreng x${qtyGoreng} = Rp${qtyGoreng*hargaGoreng}\n\n*Bonus:*\n• Ayam Bawang x${bonus}\n\nSubtotal: Rp${subtotal}\nOngkir: Rp${ongkir}\n*Total Bayar: Rp${totalBayar}*\n\nNama: ${nama}\nAlamat: ${alamat}\n\nTerima kasih kak 🙏`;
  
  let waLink = `https://wa.me/6282112007575?text=${encodeURIComponent(message)}`;
  document.getElementById('btnWA').href = waLink;
}

// Update total saat input berubah
document.getElementById('qtyAyamBawang').addEventListener('input', updateTotal);
document.getElementById('qtyGoreng').addEventListener('input', updateTotal);
document.getElementById('nama').addEventListener('input', updateTotal);
document.getElementById('alamat').addEventListener('input', updateTotal);

// Initial update
updateTotal();
</script>

</body>
</html>
