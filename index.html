<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishoa.id 🍜</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
input, button { touch-action: manipulation; }
html { scroll-behavior: smooth; }

img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
}
</style>
</head>

<body class="bg-black text-white">

<!-- NAVBAR -->
<div class="sticky top-0 z-50 bg-white/5 border-b border-white/10 px-6 py-4 flex justify-between items-center backdrop-blur-sm">
  <h1 class="font-bold text-lg">🍜 Mishoa.id</h1>
  <div onclick="scrollToCart()" class="cursor-pointer bg-orange-500 px-4 py-2 rounded-xl font-semibold hover:scale-105 transition">
    🛒 <span id="cartCount">0</span>
  </div>
</div>

<!-- HERO -->
<section class="text-center py-16 px-4 sm:px-6">
  <h2 class="text-4xl sm:text-5xl font-bold mb-6 leading-tight">
    Mishoa Premium <br> Cepat & Praktis 🍜
  </h2>
  <p class="text-gray-400 max-w-xl mx-auto mb-8">
    Order langsung via WhatsApp. Pilihan Rasa, Dibawah ini.
  </p>
  <button onclick="scrollToCart()" class="bg-orange-500 px-6 py-3 rounded-xl font-semibold hover:scale-105 transition">
    Pesan Sekarang
  </button>
</section>

<!-- PRODUK -->
<div class="max-w-6xl mx-auto px-4 sm:px-6 pb-16">
  <div id="productList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
</div>

<!-- CART -->
<div id="cartSection" class="max-w-xl mx-auto bg-white/20 border border-white/20 p-6 rounded-2xl mb-32">
  <h2 class="text-xl font-bold mb-4">🛒 Keranjang</h2>

  <div id="cart"></div>

  <input id="nama" placeholder="Nama" class="bg-white/30 border border-white/20 p-3 w-full mt-3 rounded-xl text-black">
  <input id="alamat" placeholder="Alamat" class="bg-white/30 border border-white/20 p-3 w-full mt-2 rounded-xl text-black">

  <h3 class="mt-4 font-bold text-lg">Total: <span id="total">Rp0</span></h3>

  <button onclick="checkout()" class="bg-green-500 hover:bg-green-600 text-white w-full mt-4 py-3 rounded-xl transition">
    Checkout via WhatsApp
  </button>
</div>

<!-- IG -->
<div style="display:flex; justify-content:center; margin:20px 0;">
  <a href="https://www.instagram.com/mishoa.id" target="_blank" 
     style="
       display:inline-flex;
       align-items:center;
       gap:10px;
       padding:12px 20px;
       background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
       color:white;
       font-weight:600;
       font-size:16px;
       text-decoration:none;
       border-radius:12px;
       box-shadow:0 4px 10px rgba(0,0,0,0.2);
       transition: transform 0.2s, box-shadow 0.2s;
     "
     onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 6px 15px rgba(0,0,0,0.3)';"
     onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 10px rgba(0,0,0,0.2)';"
  >
    <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" 
         alt="Instagram" 
         style="width:24px;height:24px;">
    Follow Kami di Instagram
  </a>
</div>

<script>
let cart = []

const formatRupiah = (n) => "Rp" + n.toLocaleString("id-ID")

let products = [
  { nama: "Ayam Bawang", harga: 15000, stock: 10, badge: "BEST SELLER", imgs: ["ayam bawang.png?v=3", ""] },
  { nama: "Laksa", harga: 18000, stock: 10, badge: "FAVORIT", imgs: ["laksa.png", ""] },
  { nama: "Goreng", harga: 17000, stock: 10, badge: "", imgs: ["https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg", ""] }
]

// RENDER PRODUK
function renderProducts(){
  let html = ""

  products.forEach((p, index)=>{
    html += `
    <div class="bg-white/10 border border-white/10 rounded-2xl p-4 relative hover:scale-105 transition-all duration-200">

      ${p.badge ? `<span class="absolute top-3 left-3 z-10 bg-orange-500 text-xs px-2 py-1 rounded">${p.badge}</span>` : ""}

      <div class="overflow-hidden rounded-xl mb-4 relative">
        <div class="flex transition-all duration-500" id="slider-${index}">
          ${p.imgs.map(img => `<img src="${img || p.imgs[0]}" class="w-full flex-shrink-0">`).join("")}
        </div>
      </div>

      <h2 class="font-semibold text-lg">${p.nama}</h2>
      <p class="text-orange-400">${formatRupiah(p.harga)}</p>
      <p class="text-sm text-gray-400 mb-2">Stok: ${p.stock}</p>

      ${
        p.stock > 0
        ? `<button onclick="addToCart('${p.nama}')" class="w-full bg-orange-500 py-2 rounded-xl hover:bg-orange-600 active:scale-95">+ Keranjang</button>`
        : `<button disabled class="w-full bg-gray-500 py-2 rounded-xl">❌ Habis</button>`
      }

    </div>
    `
  })

  document.getElementById("productList").innerHTML = html
  startAllSliders()
}

// SLIDER FIX
let sliderIntervals = []

function startAllSliders(){
  sliderIntervals.forEach(i => clearInterval(i))
  sliderIntervals = []

  products.forEach((p, index)=>{
    let el = document.getElementById(`slider-${index}`)
    let current = 0

    let imgs = p.imgs.filter(img => img && img.trim() !== "")
    if(imgs.length <= 1) return

    let interval = setInterval(()=>{
      current++
      if(current >= imgs.length) current = 0
      el.style.transform = `translateX(-${current * 100}%)`
    }, 2500)

    sliderIntervals.push(interval)
  })
}

// CART
function addToCart(nama){
  let p = products.find(p => p.nama === nama)
  if(p.stock <= 0) return

  let item = cart.find(i => i.nama === nama)

  if(item){ item.qty++ } 
  else { cart.push({nama, harga:p.harga, qty:1}) }

  p.stock--
  renderCart()
  renderProducts()
}

function tambahQty(nama){
  let item = cart.find(i => i.nama === nama)
  let p = products.find(p => p.nama === nama)

  if(p.stock <= 0) return

  item.qty++
  p.stock--

  renderCart()
  renderProducts()
}

function kurangQty(nama){
  let item = cart.find(i => i.nama === nama)
  let p = products.find(p => p.nama === nama)

  if(!item) return

  item.qty--
  p.stock++

  if(item.qty <= 0){
    cart = cart.filter(i => i.nama !== nama)
  }

  renderCart()
  renderProducts()
}

// RENDER CART (FIX FINAL)
function renderCart(){
  let html = ""
  let total = 0
  let totalQty = 0

  cart.forEach(item=>{
    let sub = item.harga * item.qty
    total += sub
    totalQty += item.qty

    html += `
    <div class="flex justify-between items-center border-b border-white/20 py-2">
      <div>
        <p class="font-semibold">${item.nama}</p>
        <div class="flex items-center gap-2 mt-1">
          <button onclick="kurangQty('${item.nama}')" class="px-2 bg-white/20 rounded">-</button>
          <span>${item.qty}</span>
          <button onclick="tambahQty('${item.nama}')" class="px-2 bg-white/20 rounded">+</button>
        </div>
      </div>
      <div class="text-right">
        <p>${formatRupiah(sub)}</p>
      </div>
    </div>
    `

  document.getElementById('cart').innerHTML = html
  document.getElementById('total').innerText = formatRupiah(total)
  document.getElementById('cartCount').innerText = totalQty
}

// CHECKOUT
function checkout(){
  if(cart.length === 0){ alert("Keranjang kosong"); return }

  let nama = document.getElementById('nama').value.trim()
  let alamat = document.getElementById('alamat').value.trim()
  if(!nama||!alamat){ alert("Isi nama & alamat dulu"); return }

  let orderId = new Date().getTime().toString().slice(-6)

  let text = `🛒 *ORDER MISHOA.ID*\n`
  text += `📦 Order#${orderId}\n\n`
  text += `🍜 *Detail Pesanan:*\n`

  let total = 0
  let totalQty = 0

  cart.forEach(i=>{
    let sub = i.harga * i.qty
    text += `• ${i.nama} x${i.qty} = ${formatRupiah(sub)}\n`
    total += sub
    totalQty += i.qty
  })

  let bonus = Math.floor(totalQty / 3)
  if(bonus > 0){
    text += `\n🎁 *Bonus:*\n`
    text += `• Ayam Bawang x${bonus}\n`
  }

  text += `\n💰 Subtotal: ${formatRupiah(total)}\n`
  text += `🚚 Ongkir: Rp0\n\n`
  text += `👤 ${nama}\n`
  text += `📍 ${alamat}`

  window.location.href = "https://wa.me/6282112007575?text=" + encodeURIComponent(text)
}

function scrollToCart(){
  document.getElementById('cartSection').scrollIntoView({behavior:'smooth'})
}

window.onload = function(){ 
  renderProducts()
}
  
</script>

</body>
</html>
